<!DOCTYPE html>
<html lang="en">

<head>
    <title>Chat bot</title>
    <style>

        .app-container {
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .input-container {
            display: flex;
            flex-direction: column;
            width: 200px;
        }

        .custom-input {
            color: grey;
            font-size: 10px;
            padding: 5px;
            margin-bottom: 5px;
            border-radius: 2px;
            border-width: 1px;
        }

        .custom-button {
            background-color: cornflowerblue;
            border-radius: 2px;
            border-width: 1px;
            color: white;
            font-size: 10px;
            padding: 5px 10px;
            margin-right: 5px
        }

    </style>
</head>

<body>
<div class="js-container"></div>

<script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>


<script src="https://unpkg.com/supersimpledev/babel.js"></script>
<script type="text/babel">

    function CustomButton({text, onClick}) {
        return (
            <>
                <button className="custom-button" onClick={onClick}>{text}</button>
            </>
        )
    }

    function CustomInput({text, type}) {
        return (
            <>
                <input type={type} placeholder={text} className="custom-input"/>
            </>
        );
    }

    function App() {
        const [showPassword, setShowPassword] = React.useState(true);
        return (
            <div className="app-container">
                <h2 className="title">
                    Hello, welcome to my website
                </h2>

                <div className="input-container">
                    <CustomInput text="Email" type="email"/>
                    <div className="password-container">
                        <CustomInput text="Password" type={showPassword ? "text": "password"}/>
                        <CustomButton text={showPassword ? "HIDE": "SHOW"} onClick={() => setShowPassword(!showPassword)}/>
                    </div>
                </div>

                <div className="buttons-container">
                    <CustomButton text="Login"/>
                    <CustomButton text="Sign up"/>
                </div>

            </div>
        )
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(
        <App/>
    );
</script>
</body>

</html>
