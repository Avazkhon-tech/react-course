<!DOCTYPE html>
<html lang="en">

<head>
    <title>Chat bot</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .send-button {
            background-color: rgb(25, 135, 84);
            color: white;
            padding: 12px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .chat-input {
            padding: 12px 15px;
            font-size: 15px;
            border-radius: 10px;
            border-width: 1px;
            flex-grow: 1;
        }

        .chat-input-container {
            display: flex;
            margin-bottom: 60px;
        }

        .app-container {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-message-user {
            display: flex;
            justify-content: flex-end;
            align-items: start;
        }

        .chat-message-robot {
            display: flex;
            align-items: start;
        }

        .chat-message-text {
            background-color: rgb(238, 238, 238);
            padding: 15px 20px;
            border-radius: 10px;
            margin-right: 10px;
            margin-left: 10px;
            margin-bottom: 20px;
            max-width: 300px
        }

        .chat-message-profile {
            width: 45px;
        }

        .chat-messages-container {
            margin-top: 20px;
            flex-grow: 1;
            overflow: scroll;
            scrollbar-width: none;
        }

    </style>
</head>

<body>
<div class="js-container"></div>

<script src="https://unpkg.com/supersimpledev/react.js"></script>
<script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

<script src="https://unpkg.com/supersimpledev/chatbot.js"></script>


<script src="https://unpkg.com/supersimpledev/babel.js"></script>
<script type="text/babel">


    function ChatInput({chatMessages, setChatMessages}) {

        const [inputText, setInputText] = React.useState('')
        const [isLoading, setIsLoading] = React.useState(false)

        function saveInputText(event) {
            setInputText(event.target.value);
        }

        async function sendMessage() {
            if (inputText === '' || isLoading) {
                return;
            }

            const userMessage = {
                id: crypto.randomUUID(),
                message: inputText,
                sender: "user",
            };

            const loadingMessage = {
                id: crypto.randomUUID(),
                message: 'loading',
                sender: "robot",
            };

            setInputText('');
            setIsLoading(true);

            setChatMessages(prev => [...prev, userMessage, loadingMessage]);

            const response = await Chatbot.getResponseAsync(inputText);

            const botMessage = {
                id: crypto.randomUUID(),
                message: response,
                sender: "robot",
            };

            setChatMessages(prev => [
                ...prev.filter(msg => msg.message !== 'loading'),
                botMessage
            ]);

            setIsLoading(false);
        }

        function handleKey(event) {
            if (event.key === "Enter") {
                sendMessage()
            } else if (event.key === "Escape") {
                resetMessage()
            }
        }

        function resetMessage() {
            setInputText('')
        }

        return (
            <div className="chat-input-container">
                <input
                    placeholder="Send a message to ChatBot"
                    size="30"
                    onChange={saveInputText}
                    value={inputText}
                    onKeyDown={handleKey}
                    className="chat-input"
                />
                <button
                    onClick={sendMessage}
                    className="send-button"
                >Send
                </button>
            </div>
        );
    }

    function ChatMessage({message, sender}) {
        return (
            <div className={
                sender === 'user'
                    ? 'chat-message-user'
                    : 'chat-message-robot'
            }>
                {sender === 'robot' && (
                    <img src="../chatbot-project/src/assets/robot.png" className="chat-message-profile"/>
                )}

                <div className="chat-message-text">
                    {message}
                </div>

                {sender === 'user' && (
                    <img src="../chatbot-project/src/assets/user.png" className="chat-message-profile"/>
                )}
            </div>
        );

    }

    function ChatMessages({chatMessages}) {
        const chatMessagesRef = React.useRef();
        React.useEffect(() => {
            const containerElem = chatMessagesRef.current;
            if (containerElem) {
                containerElem.scrollTop = containerElem.scrollHeight;
            }
        }, [chatMessages]);
        return (
            <div className="chat-messages-container" ref={chatMessagesRef}>
                {chatMessages.map((chatMessage) => {
                    return (
                        <ChatMessage
                            key={chatMessage.id}
                            message={chatMessage.message}
                            sender={chatMessage.sender}
                        />
                    );
                })}
            </div>
        )
            ;
    }

    function App() {
        const [chatMessages, setChatMessages] = React.useState([
            {
                id: crypto.randomUUID(),
                message: "Hello, ChatBot!",
                sender: "user"
            },
            {
                id: crypto.randomUUID(),
                message: "Hello! How can I help you?",
                sender: "robot"
            },
            {
                id: crypto.randomUUID(),
                message: "can you get me todays date?",
                sender: "user"
            },
            {
                id: crypto.randomUUID(),
                message: "Today is April 11",
                sender: "robot"
            }
        ]);

        return (
            <div className="app-container">
                <ChatMessages
                    chatMessages={chatMessages}
                />

                <ChatInput
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                />

            </div>
        )
    }

    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(
        <App/>
    );
</script>
</body>

</html>
